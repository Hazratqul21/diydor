<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F6D9CC"/>
      <stop offset="0.55" stop-color="#EBB59D"/>
      <stop offset="1" stop-color="#BE4A2E"/>
    </linearGradient>
    <linearGradient id="heartA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FBF6F0"/>
      <stop offset="1" stop-color="#F2C6B4"/>
    </linearGradient>
    <linearGradient id="heartB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#C9502F"/>
      <stop offset="1" stop-color="#9C3A22"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.6">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="800" height="720" fill="url(#sky)"/>
  <rect width="800" height="720" fill="url(#glow)"/>

  <!-- yumshoq dumaloq dog'lar (bokeh) -->
  <g opacity="0.35" filter="url(#soft)">
    <circle cx="120" cy="140" r="46" fill="#FBF6F0"/>
    <circle cx="700" cy="110" r="32" fill="#FBF6F0"/>
    <circle cx="640" cy="300" r="22" fill="#FBF6F0"/>
    <circle cx="150" cy="420" r="26" fill="#FBF6F0"/>
  </g>

  <!-- ikki bir-biriga yaqin yurak (bog'lanish ramzi) -->
  <g transform="translate(400 350)">
    <path transform="translate(-40 10) scale(1.15)" fill="url(#heartB)" opacity="0.92"
      d="M0 60 C -70 0 -110 -55 -60 -95 C -30 -118 5 -100 0 -60 C -5 -100 30 -118 60 -95 C 110 -55 70 0 0 60 Z"/>
    <path transform="translate(55 -20) scale(0.95)" fill="url(#heartA)"
      d="M0 60 C -70 0 -110 -55 -60 -95 C -30 -118 5 -100 0 -60 C -5 -100 30 -118 60 -95 C 110 -55 70 0 0 60 Z"/>
  </g>

  <!-- pastki yumshoq krem gradient (matn o'qilishi uchun) -->
  <rect x="0" y="470" width="800" height="250" fill="#FBF6F0" opacity="0.0"/>
  <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#FBF6F0" stop-opacity="0"/>
    <stop offset="1" stop-color="#FBF6F0" stop-opacity="0.9"/>
  </linearGradient>
  <rect x="0" y="520" width="800" height="200" fill="url(#fade)"/>
</svg>
