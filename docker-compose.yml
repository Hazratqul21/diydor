services:
  postgres:
    image: postgres:16-alpine
    container_name: diydor-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: diydor
      POSTGRES_PASSWORD: diydor
      POSTGRES_DB: diydor
    ports:
      - "5433:5432"
    volumes:
      - ./.docker-data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U diydor"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: diydor-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - ./.docker-data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
